services:
  postgres:
    image: postgres:16-alpine
    container_name: iplpredictiongame-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iplpredictiongame_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iplpredictiongame_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
